openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HTML Link Parser and Analyzer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: parser
    description: Link parsing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /parse/url:
    post:
      operationId: parseUrl
      tags: [parser]
      summary: Parse links from a URL
      description: Fetches a URL and extracts all links with categorization and structural context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseUrlInput"
      responses:
        "200":
          description: Parsed link results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Failed to fetch URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /parse/file:
    post:
      operationId: parseFile
      tags: [parser]
      summary: Parse links from HTML content
      description: Accepts raw HTML content as a string and extracts all links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseFileInput"
      responses:
        "200":
          description: Parsed link results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /parse/list:
    post:
      operationId: parseList
      tags: [parser]
      summary: Parse a freeform list of URLs
      description: |
        Accepts a multi-line dump of URLs (one per line, tolerant of bullets,
        numbering, markdown links, and surrounding whitespace) and returns the
        same ParseResult shape as the HTML endpoints, with `grouped_by_domain`
        as the primary view. No DOM is involved so `grouped` will be empty.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseListInput"
      responses:
        "200":
          description: Parsed link results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ParseUrlInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: The URL to fetch and parse
    ParseFileInput:
      type: object
      properties:
        html_content:
          type: ["string", "null"]
          description: Raw HTML content string to parse (for .html/.htm files)
        file_content_b64:
          type: ["string", "null"]
          description: Base64-encoded file content (for binary formats like .webarchive)
        filename:
          type: ["string", "null"]
          description: Optional filename for display purposes and format detection
        base_url:
          type: ["string", "null"]
          description: Optional base URL for resolving relative links
    ParseListInput:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Multi-line dump of URLs, one per line
        source:
          type: ["string", "null"]
          description: Optional display label for the result (e.g. "clipboard")
        base_url:
          type: ["string", "null"]
          description: Optional base URL for resolving relative entries
    ParseResult:
      type: object
      required:
        - source
        - base_url
        - links
        - metrics
        - grouped
        - grouped_by_domain
      properties:
        source:
          type: string
          description: The source identifier (URL or filename)
        base_url:
          type: string
          description: Base URL used for resolving relative links
        links:
          type: array
          items:
            $ref: "#/components/schemas/ParsedLink"
        metrics:
          $ref: "#/components/schemas/LinkMetrics"
        grouped:
          type: array
          items:
            $ref: "#/components/schemas/GroupedSection"
        grouped_by_domain:
          type: array
          items:
            $ref: "#/components/schemas/DomainGroup"
    ParsedLink:
      type: object
      required:
        - id
        - text
        - href
        - resolved_href
        - type
        - section
        - heading
        - position
        - host
        - domain
      properties:
        id:
          type: integer
          description: Sequential link ID
        text:
          type: string
          description: Visible link text
        href:
          type: string
          description: Original href attribute
        resolved_href:
          type: string
          description: Absolute resolved URL
        type:
          type: string
          enum: [internal, external, anchor, special]
          description: Link category
        section:
          type: ["string", "null"]
          description: Semantic section the link belongs to (header, nav, main, footer, etc.)
        heading:
          type: ["string", "null"]
          description: Nearest preceding heading in the same section
        position:
          type: integer
          description: DOM order position of the link
        host:
          type: string
          description: Full hostname of the resolved URL ("" for anchors / non-HTTP schemes)
        domain:
          type: string
          description: Registrable domain ("" for anchors / non-HTTP schemes)
    LinkMetrics:
      type: object
      required:
        - total
        - internal
        - external
        - anchor
        - special
        - unique_domains
      properties:
        total:
          type: integer
        internal:
          type: integer
        external:
          type: integer
        anchor:
          type: integer
        special:
          type: integer
        unique_domains:
          type: integer
          description: Number of distinct registrable domains across all links
    DomainGroup:
      type: object
      required:
        - domain
        - hosts
        - count
        - links
      properties:
        domain:
          type: string
          description: Registrable domain (e.g. "github.com"). Empty string buckets links with no host.
        hosts:
          type: array
          items:
            type: string
          description: Distinct hostnames seen under this domain
        count:
          type: integer
        links:
          type: array
          items:
            $ref: "#/components/schemas/ParsedLink"
    GroupedSection:
      type: object
      required:
        - section
        - headings
      properties:
        section:
          type: string
          description: Name of the semantic section
        headings:
          type: array
          items:
            $ref: "#/components/schemas/HeadingGroup"
    HeadingGroup:
      type: object
      required:
        - heading
        - links
      properties:
        heading:
          type: ["string", "null"]
          description: Heading text (null if no heading)
        links:
          type: array
          items:
            $ref: "#/components/schemas/ParsedLink"
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
