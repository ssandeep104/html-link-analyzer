name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build parser-core
        run: pnpm --filter @workspace/parser-core run build

      - name: Typecheck API
        run: pnpm --filter @workspace/api run typecheck

      - name: Test parser-core
        run: pnpm --filter @workspace/parser-core test

      - name: Build frontend
        run: pnpm --filter @workspace/link-parser run build
